# Deploy Cloud Builder to Azure Web App (zip deploy).
# Requires GitHub secret: AZURE_WEBAPP_PUBLISH_PROFILE (download from App Service > Get publish profile).
# On push to main, runs only when application code changes (not for README, deploy/, or workflow file edits).

name: Deploy to Azure Web App

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'web/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - 'jest.config.js'
      - 'tests/**'
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: cloud-builder-dev-app   # set to your Web App name if different

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # opt into Node 24 for actions (required from June 2026)
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Node app
        run: npm run build

      - name: Build web UI
        run: npm run build:web

      - name: Create deployment package
        run: |
          zip -r app.zip dist web-dist src package.json package-lock.json tsconfig.json

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: app.zip
